name: chataptor
description: Headless Dart client for Chataptor — real-time, auto-translated customer support chat in 100+ languages. Free forever. Pair with chataptor_flutter for drop-in widgets.
version: 0.2.0
repository: https://github.com/chataptor/chataptor-flutter
homepage: https://chataptor.com?utm_source=pub.dev&utm_medium=referral&utm_campaign=chataptor&utm_content=pubspec_homepage
issue_tracker: https://github.com/chataptor/chataptor-flutter/issues
topics:
  - chat
  - support
  - multilingual
  - realtime
  - translation

environment:
  sdk: ^3.9.0

resolution: workspace

dependencies:
  async: ^2.11.0
  http: ^1.2.0
  meta: ^1.12.0
  phoenix_socket: ^0.8.0

dev_dependencies:
  mocktail: ^1.0.3
  test: ^1.25.0
