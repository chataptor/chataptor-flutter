name: chataptor_flutter
description: Drop-in Flutter widgets for Chataptor — real-time, auto-translated customer support chat in 100+ languages. Free forever. Built-in theming, localization, lifecycle.
version: 0.1.0
repository: https://github.com/chataptor/chataptor-flutter
homepage: https://chataptor.com?utm_source=pub.dev&utm_medium=referral&utm_campaign=chataptor_flutter&utm_content=pubspec_homepage
issue_tracker: https://github.com/chataptor/chataptor-flutter/issues
topics:
  - chat
  - support
  - multilingual
  - widget
  - translation

environment:
  sdk: ^3.9.0
  flutter: '>=3.35.0'

resolution: workspace

dependencies:
  chataptor: ^0.1.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
